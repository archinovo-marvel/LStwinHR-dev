<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#2C2C2C"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#6B5A45"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logomark: Abstract LS monogram with neural node concept -->
  <g transform="translate(10, 10)">
    <!-- Outer ring - connection/global aspect -->
    <circle cx="50" cy="50" r="46" stroke="url(#grad1)" stroke-width="1.5" fill="none" opacity="0.3"/>
    <circle cx="50" cy="50" r="38" stroke="url(#grad1)" stroke-width="1" fill="none" opacity="0.15"/>

    <!-- L path - main stroke -->
    <path d="M28 22 L28 72 L54 72" stroke="url(#grad1)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- S path - flowing curve intersecting L -->
    <path d="M66 30 C66 22 50 18 44 28 C38 38 52 42 52 52 C52 64 36 66 30 58"
          stroke="url(#grad1)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Neural nodes at intersections -->
    <circle cx="28" cy="22" r="4" fill="#8B7355" filter="url(#glow)"/>
    <circle cx="54" cy="72" r="4" fill="#8B7355" filter="url(#glow)"/>
    <circle cx="28" cy="72" r="4" fill="#8B7355" filter="url(#glow)"/>
    <circle cx="44" cy="28" r="3" fill="#8B7355" opacity="0.8"/>
    <circle cx="52" cy="52" r="3" fill="#8B7355" opacity="0.8"/>

    <!-- Subtle connection lines - intelligence network -->
    <line x1="28" y1="22" x2="44" y2="28" stroke="#8B7355" stroke-width="0.8" opacity="0.4"/>
    <line x1="54" y1="72" x2="52" y2="52" stroke="#8B7355" stroke-width="0.8" opacity="0.4"/>
    <line x1="28" y1="72" x2="52" y2="52" stroke="#8B7355" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Chinese text: 招聘灵犀 -->
  <text x="120" y="52" font-family="'Noto Serif SC', 'STKaiti', 'KaiTi', serif" font-size="32" font-weight="400" fill="#1A1A1A" letter-spacing="4">招聘灵犀</text>

  <!-- English wordmark -->
  <text x="120" y="82" font-family="'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" fill="#6B6B6B" letter-spacing="6">LSTWIN AI RECRUITMENT</text>

  <!-- Decorative underline accent -->
  <rect x="120" y="92" width="48" height="2" rx="1" fill="url(#grad2)"/>
</svg>
