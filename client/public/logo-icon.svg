<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#2C2C2C"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" stroke="url(#g1)" stroke-width="1" fill="none" opacity="0.25"/>

  <!-- L path -->
  <path d="M18 14 L18 46 L36 46" stroke="url(#g1)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- S path -->
  <path d="M44 20 C44 14 32 11 28 18 C24 25 34 28 34 34 C34 43 22 44 18 38"
        stroke="url(#g1)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Neural nodes -->
  <circle cx="18" cy="14" r="3" fill="#8B7355" filter="url(#glow)"/>
  <circle cx="36" cy="46" r="3" fill="#8B7355" filter="url(#glow)"/>
  <circle cx="18" cy="46" r="3" fill="#8B7355" filter="url(#glow)"/>
  <circle cx="28" cy="18" r="2.2" fill="#8B7355" opacity="0.9"/>
  <circle cx="34" cy="34" r="2.2" fill="#8B7355" opacity="0.9"/>
</svg>
